<div class="grid grid-cols-6 gap-4">
  @for (photo of photos(); track photo.id) {
    <div class="flex flex-col w-full gap-3 column">
      <img src="{{ photo.url }}" alt="user image" class="img-thumbnail p-1" />
      <div class="flex gap-3">
        <button class="btn btn-success w-2/4" (click)="ApprovePhoto(photo.id)">Approve</button>
        <button class="btn btn-error w-2/4" (click)="RejectPhoto(photo.id)">Reject</button>
      </div>
    </div>
  }
</div>
